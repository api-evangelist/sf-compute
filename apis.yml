apis:
- aid: sf-compute:orders-api
  name: SF Compute Orders API
  description: The SF Compute Orders API is the REST control plane for placing, listing, and managing orders
    that reserve GPU node-hours on H100 and H200 clusters. Orders specify node count, duration, and start
    time. Authentication uses bearer tokens generated via the sf CLI.
