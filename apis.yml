aid: sf-compute
name: San Francisco Compute Company
description: San Francisco Compute Company (SF Compute) operates a market for buying short-duration time
  on H100 and H200 GPU clusters with no long-term contracts. Customers reserve VM nodes for any quantity,
  duration, and start time through the sf CLI and the sfcompute.com Orders API, with managed Slurm and bare-metal
  clusters available by request.
